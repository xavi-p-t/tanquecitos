<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Match Control</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08110b;
        --panel: rgba(10, 25, 15, 0.92);
        --border: #35ff74;
        --text: #e8ffef;
        --muted: #97b3a0;
        --danger: #ff7d7d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(53, 255, 116, 0.14), transparent 36%),
          linear-gradient(180deg, #071008 0%, var(--bg) 100%);
        color: var(--text);
        font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        background: var(--panel);
        border: 1px solid rgba(53, 255, 116, 0.45);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(53, 255, 116, 0.4);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        margin-bottom: 14px;
      }

      button {
        width: 100%;
        padding: 13px 16px;
        border: 0;
        border-radius: 12px;
        background: var(--border);
        color: #041008;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      #status {
        min-height: 24px;
        margin-top: 14px;
        font-weight: 600;
      }

      .error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Match Control</h1>
      <p>
        Hidden URL is only obscurity. Real protection comes from the admin secret.
      </p>
      <label for="secret">Admin secret</label>
      <input id="secret" type="password" autocomplete="current-password">
      <button id="restartButton" type="button">Restart Match To Waiting Room</button>
      <div id="status" aria-live="polite"></div>
    </main>
    <script>
      const secretInput = document.getElementById('secret');
      const restartButton = document.getElementById('restartButton');
      const status = document.getElementById('status');

      restartButton.addEventListener('click', async () => {
        const secret = secretInput.value.trim();
        if (!secret) {
          status.textContent = 'Enter the admin secret first.';
          status.className = 'error';
          return;
        }

        restartButton.disabled = true;
        status.textContent = 'Restarting match...';
        status.className = '';

        try {
          const response = await fetch('/api/admin/restart-match', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Admin-Secret': secret
            },
            body: JSON.stringify({ secret })
          });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || 'Failed to restart match.');
          }
          status.textContent = 'Match restarted. Players are back in the waiting room.';
          status.className = '';
        } catch (error) {
          status.textContent = error.message || 'Failed to restart match.';
          status.className = 'error';
        } finally {
          restartButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
